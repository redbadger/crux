[package]
name = "shared"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["lib", "staticlib", "cdylib"]
name = "shared"

[[bin]]
name = "codegen"
required-features = ["codegen"]

[features]
# Deprecated compatibility features kept only for the migration window.
uniffi = ["dep:uniffi"]
wasm_bindgen = ["dep:wasm-bindgen", "dep:getrandom"]
codegen = [
    "dep:anyhow",
    "dep:clap",
    "dep:log",
    "dep:pretty_env_logger",
    "facet_typegen",
]
facet_typegen = ["crux_core/facet_typegen"]

[dependencies]
clap = { version = "4.6.1", optional = true, features = ["derive"] }
boltffi.workspace = true
crux_core.workspace = true
crux_http.workspace = true
crux_kv.workspace = true
crux_time.workspace = true
derive_builder = "0.20.2"
facet = { version = "=0.44", features = ["chrono"] }
getrandom = { version = "0.4", optional = true, features = ["wasm_js"] }
anyhow = { workspace = true, optional = true }
log = { version = "0.4.29", optional = true }
pretty_env_logger = { version = "0.5.0", optional = true }
serde = { workspace = true, features = ["derive"] }
tracing = "0.1"
serde_json = "1.0"
uniffi = { version = "=0.29.4", optional = true }
wasm-bindgen = { version = "0.2.121", optional = true }

[dev-dependencies]
assert_let_bind = "0.1"
crux_core = { workspace = true, features = ["testing"] }
insta = { version = "1.47.2", features = ["yaml"] }
rstest = "0.26"

# wasm
[target.'cfg(target_family = "wasm")'.dependencies]
getrandom = { version = "=0.3.4", features = ["wasm_js"] }
