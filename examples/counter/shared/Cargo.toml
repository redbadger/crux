[package]
name = "shared"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true

[lints.clippy]
pedantic = "warn"
nursery = "warn"

[lib]
crate-type = ["cdylib", "lib", "staticlib"]

# ANCHOR: typegen_bin
[[bin]]
name = "codegen"
required-features = ["codegen"]
# ANCHOR_END: typegen_bin

# ANCHOR: typegen
[features]
facet_typegen = ["crux_core/facet_typegen"]
# ANCHOR_END: typegen
codegen = [
    "dep:anyhow",
    "dep:clap",
    "dep:log",
    "dep:pretty_env_logger",
    "facet_typegen",
]

# ANCHOR: typegen_deps
[dependencies]
facet = { version = "=0.44", features = ["chrono"] }
# ANCHOR_END: typegen_deps
boltffi.workspace = true
crux_core.workspace = true
serde = { workspace = true, features = ["derive"] }

# optional dependencies
anyhow = { workspace = true, optional = true }
clap = { version = "4.6.1", optional = true, features = ["derive"] }
log = { version = "0.4.29", optional = true }
pretty_env_logger = { version = "0.5.0", optional = true }

[dev-dependencies]
crux_core = { workspace = true, features = ["testing"] }
