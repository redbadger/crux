[package]
name = "shared"
version = "0.1.0"
authors.workspace = true
repository.workspace = true
edition.workspace = true
license.workspace = true
keywords.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["lib", "staticlib", "cdylib"]

[[bin]]
name = "codegen"
required-features = ["codegen"]

[features]
codegen = [
    "dep:anyhow",
    "dep:clap",
    "dep:log",
    "dep:pretty_env_logger",
    "facet_typegen",
]
facet_typegen = ["crux_core/facet_typegen"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[dependencies]
automerge = { version = "=0.4.1", features = ["wasm"] }
boltffi.workspace = true
crux_core.workspace = true
crux_kv.workspace = true
crux_time.workspace = true
facet = "=0.44"
futures = "0.3"
serde = { workspace = true, features = ["derive"] }

# optional dependencies
anyhow = { workspace = true, optional = true }
clap = { version = "4.6.1", optional = true, features = ["derive"] }
log = { version = "0.4.30", optional = true }
pretty_env_logger = { version = "0.5.0", optional = true }

[lints]
workspace = true

[dev-dependencies]
crux_core = { workspace = true, features = ["testing"] }
