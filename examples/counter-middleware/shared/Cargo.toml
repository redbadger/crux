[package]
name = "shared"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true

[lib]
crate-type = ["cdylib", "lib", "staticlib"]

[[bin]]
name = "codegen"
required-features = ["codegen"]

[features]
uniffi = ["dep:uniffi", "dep:rand", "dep:getrandom"]
wasm_bindgen = ["dep:wasm-bindgen", "getrandom/wasm_js", "dep:js-sys"]
wit_bindgen = ["dep:wit-bindgen", "facet_typegen"]
codegen = [
  "crux_core/cli",
  "dep:clap",
  "dep:log",
  "dep:pretty_env_logger",
  "uniffi",
  "facet_typegen",
]
facet_typegen = ["crux_core/facet_typegen"]

[dependencies]
async-sse = "5.1.0"
chrono = { version = "0.4.44", features = ["serde"] }
crux_core.workspace = true
crux_http.workspace = true
facet = { version = "0.44", features = ["chrono"] }
futures = "0.3.32"
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0.149"
url = "2.5.8"

# optional dependencies
clap = { version = "4.6.0", optional = true, features = ["derive"] }
getrandom = { version = "=0.3", optional = true, default-features = false }
js-sys = { version = "0.3.91", optional = true }
log = { version = "0.4.29", optional = true }
pretty_env_logger = { version = "0.5.0", optional = true }
rand = { version = "0.10", optional = true, features = ["sys_rng"] }
uniffi = { version = "=0.29.4", optional = true }
wasm-bindgen = { version = "0.2.114", optional = true }
wit-bindgen = { version = "0.54.0", optional = true }

[lints]
workspace = true

[dev-dependencies]
insta = { version = "1.46.3", features = ["yaml"] }

# wasm
[target.'cfg(target_family = "wasm")'.dependencies]
getrandom = { version = "=0.3.4", features = ["wasm_js"] }
