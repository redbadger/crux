[package]
name = "shared"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true

[lib]
crate-type = ["cdylib", "lib", "staticlib"]

[[bin]]
name = "codegen"
required-features = ["codegen"]

[features]
default = ["ffi"]
# The BoltFFI surface (CoreFFI + CruxShell callback trait). Enabled by default
# for the native (Android/Apple) and web-nextjs builds. The Leptos shell links
# `shared` directly into its own wasm binary and must build with this feature
# disabled, because `#[boltffi::export]` on the callback trait emits `"env"`
# wasm imports that neither trunk nor the Leptos runtime provides.
ffi = ["dep:boltffi"]
codegen = [
    "dep:anyhow",
    "dep:clap",
    "dep:log",
    "dep:pretty_env_logger",
    "facet_typegen",
]
facet_typegen = ["crux_core/facet_typegen"]

[dependencies]
async-sse = "5.1.0"
boltffi = { workspace = true, optional = true }
chrono = { version = "0.4.45", features = ["serde"] }
crux_core.workspace = true
crux_http.workspace = true
facet = { version = "=0.44", features = ["chrono"] }
futures = "0.3.32"
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0.150"
url = "2.5.8"

# optional dependencies
clap = { version = "4.6.1", optional = true, features = ["derive"] }
anyhow = { workspace = true, optional = true }
log = { version = "0.4.32", optional = true }
pretty_env_logger = { version = "0.5.0", optional = true }

[lints]
workspace = true

[dev-dependencies]
insta = { version = "1.47.2", features = ["yaml"] }
crux_core = { workspace = true, features = ["testing"] }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
rand = { version = "0.10", features = ["sys_rng"] }

[target.'cfg(target_family = "wasm")'.dependencies]
getrandom = { version = "=0.3.4", features = ["wasm_js"] }
